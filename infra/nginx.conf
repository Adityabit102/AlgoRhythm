# AlgoRhythm — nginx reverse proxy in front of gunicorn.
# Certbot rewrites this to add the SSL (443) server block:
#   sudo certbot --nginx -d api.yourdomain.com

limit_req_zone $binary_remote_addr zone=algorhythm:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # generous body limit for batch-predict payloads
    client_max_body_size 1m;

    location / {
        limit_req zone=algorhythm burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
